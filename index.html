<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>FCR Fleet Manager</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--n:#0D1B2A;--b:#1565C0;--g:#F5A623;--gbg:#E8F5E9;--gt:#2E7D32;--rbg:#FFEBEE;--rt:#C62828;--gray:#546E7A;--li:#F4F6F8;--br:#E0E6ED;--sold:#7B1FA2;--soldbg:#F3E5F5}
body{font-family:-apple-system,BlinkMacSystemFont,sans-serif;background:var(--li);color:var(--n);min-height:100vh;padding-bottom:90px}
.hdr{background:var(--n);padding:16px 20px 0;position:sticky;top:0;z-index:100}
.htop{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.htop h1{color:#fff;font-size:22px;font-weight:800}
.htop h1 span{color:var(--g)}
.addbtn{background:var(--g);color:var(--n);border:none;border-radius:50%;width:44px;height:44px;font-size:28px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.stabs{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;border-top:1px solid rgba(255,255,255,.1)}
.stab{padding:10px 4px 13px;text-align:center;cursor:pointer;border-bottom:3px solid transparent}
.stab.aa{border-bottom-color:#fff}.stab.av{border-bottom-color:#69F0AE}.stab.dn{border-bottom-color:#FF5252}.stab.sl{border-bottom-color:#CE93D8}
.sn{font-size:20px;font-weight:800;color:#fff}.sn.g{color:#69F0AE}.sn.r{color:#FF5252}.sn.p{color:#CE93D8}
.sl2{font-size:9px;text-transform:uppercase;letter-spacing:.6px;color:rgba(255,255,255,.6);margin-top:2px}
.sw{padding:12px 16px;background:#fff;border-bottom:1px solid var(--br)}
.sw input{width:100%;padding:11px 16px;border:1.5px solid var(--br);border-radius:24px;font-size:15px;background:var(--li);outline:none;color:var(--n)}
.ctabs{display:flex;gap:8px;padding:10px 16px;overflow-x:auto;background:#fff;border-bottom:1px solid var(--br);scrollbar-width:none}
.ctabs::-webkit-scrollbar{display:none}
.ct{flex-shrink:0;padding:6px 12px;border-radius:20px;border:1.5px solid var(--br);font-size:12px;font-weight:600;cursor:pointer;background:#fff;color:var(--gray);display:flex;flex-direction:column;align-items:center;gap:2px}
.ct.on{background:var(--n);color:#fff;border-color:var(--n)}
.ct-counts{font-size:10px;font-weight:700;display:flex;gap:4px}
.ct-av{color:var(--gt)}.ct-dn{color:var(--rt)}
.ct.on .ct-av{color:#69F0AE}.ct.on .ct-dn{color:#FF8A80}
.lst{padding:12px 16px;display:flex;flex-direction:column;gap:10px}
.card{background:#fff;border-radius:14px;padding:14px 16px 12px;box-shadow:0 1px 6px rgba(0,0,0,.07);border-left:5px solid transparent}
.card.available{border-left-color:var(--gt)}.card.down{border-left-color:var(--rt)}.card.sold{border-left-color:var(--sold);opacity:.85}
.mn{font-size:16px;font-weight:700;color:var(--n)}
.ms{font-size:12px;color:var(--gray);margin-bottom:8px}
.nt{font-size:12px;color:var(--gray);background:var(--li);border-radius:8px;padding:7px 10px;line-height:1.4;margin-bottom:8px}
.tog{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.tog3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:8px}
.tb{padding:11px 8px;border-radius:10px;border:2px solid var(--br);font-size:13px;font-weight:700;cursor:pointer;background:#fff;color:var(--gray);text-align:center}
.tb.oa{background:var(--gbg);color:var(--gt);border-color:var(--gt)}
.tb.od{background:var(--rbg);color:var(--rt);border-color:var(--rt)}
.tb.os{background:var(--soldbg);color:var(--sold);border-color:var(--sold)}
.cbtns{display:flex;gap:8px;padding-top:8px;border-top:1px solid var(--br)}
.cb{flex:1;padding:8px;border-radius:8px;border:none;font-size:12px;font-weight:600;cursor:pointer;background:var(--li);color:var(--n)}
.empty{text-align:center;padding:60px 20px;color:var(--gray)}
.ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:200;align-items:flex-end;justify-content:center}
.ov.open{display:flex}
.sh{background:#fff;border-radius:24px 24px 0 0;width:100%;max-width:600px;max-height:92vh;overflow-y:auto;padding-bottom:40px}
.hdl{width:40px;height:4px;background:var(--br);border-radius:2px;margin:12px auto 0}
.shdr{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 12px;border-bottom:1px solid var(--br)}
.sttl{font-size:18px;font-weight:700}
.xcl{background:var(--li);border:none;border-radius:50%;width:32px;height:32px;font-size:18px;cursor:pointer;color:var(--gray);display:flex;align-items:center;justify-content:center}
.frm{padding:16px 20px}
.fg{margin-bottom:16px}
.fg label{display:block;font-size:11px;font-weight:700;color:var(--gray);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.fg input,.fg select,.fg textarea{width:100%;padding:12px 14px;border:1.5px solid var(--br);border-radius:10px;font-size:15px;color:var(--n);background:#fff;outline:none;font-family:inherit;-webkit-appearance:none}
.fg textarea{height:80px;resize:none;line-height:1.5}
.two{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.spk{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.so{padding:14px;border-radius:12px;border:2px solid var(--br);text-align:center;cursor:pointer;font-size:14px;font-weight:700;color:var(--gray)}
.so .ic{font-size:22px;display:block;margin-bottom:4px}
.so.sa{border-color:var(--gt);background:var(--gbg);color:var(--gt)}
.so.sd{border-color:var(--rt);background:var(--rbg);color:var(--rt)}
.fbtns{padding:0 20px;display:flex;flex-direction:column;gap:10px;margin-top:4px}
.fb{padding:15px;border-radius:12px;border:none;font-size:15px;font-weight:700;cursor:pointer}
.fsv{background:var(--n);color:#fff}.fcn{background:var(--li);color:var(--n)}
.fdl{background:var(--rbg);color:var(--rt);display:none}
.fsl{background:var(--soldbg);color:var(--sold);display:none}
.down-sheet .shdr{background:var(--rbg)}.down-sheet .sttl{color:var(--rt)}
.sell-sheet .shdr{background:var(--soldbg)}.sell-sheet .sttl{color:var(--sold)}
.rgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:4px}
.rbtn{padding:11px 8px;border-radius:10px;border:1.5px solid var(--br);font-size:13px;font-weight:600;cursor:pointer;background:#fff;color:var(--gray);text-align:center;line-height:1.3}
.rbtn.on{border-color:var(--rt);background:var(--rbg);color:var(--rt)}
.hpage{padding:16px}
.hback{background:var(--n);padding:16px 20px;display:flex;align-items:center;gap:12px}
.hback button{background:none;border:none;color:#fff;font-size:20px;cursor:pointer}
.hback .htitle{color:#fff;font-size:17px;font-weight:700}
.hback .hsub{color:rgba(255,255,255,.6);font-size:12px}
.hedit{background:rgba(255,255,255,.15);border:none;color:#fff;border-radius:8px;padding:6px 12px;font-size:13px;font-weight:600;cursor:pointer}
.svctypes{display:flex;gap:8px;margin-bottom:12px}
.sbt{flex:1;padding:8px 4px;border-radius:8px;border:1.5px solid var(--br);background:#fff;font-size:12px;font-weight:600;cursor:pointer;color:var(--gray);text-align:center}
.sbt.on{border-color:var(--b);background:#E3F2FD;color:var(--b)}
.addsvc{width:100%;padding:10px;border-radius:10px;border:1.5px dashed var(--br);background:#fff;font-size:13px;font-weight:600;color:var(--b);cursor:pointer;margin-bottom:12px}
.svcbox{background:#fff;border-radius:12px;padding:14px;margin-bottom:12px;border:1.5px solid var(--br)}
.hentry{padding:10px 14px;border-radius:10px;background:var(--li);margin-bottom:8px}
.hdate{font-size:11px;color:var(--gray);margin-bottom:2px}
.htype{display:inline-block;font-size:10px;font-weight:700;text-transform:uppercase;padding:2px 8px;border-radius:10px;margin-bottom:4px}
.ht-s{background:#FFF3E0;color:#E65100}.ht-r{background:var(--rbg);color:var(--rt)}
.ht-n{background:var(--li);color:var(--gray)}.ht-st{background:#E3F2FD;color:var(--b)}
.ht-d{background:var(--rbg);color:var(--rt)}.ht-ac{background:#E8F5E9;color:var(--gt)}
.ht-sl{background:var(--soldbg);color:var(--sold)}
.hnote{font-size:13px;color:var(--n);line-height:1.4}
.divider{height:1px;background:var(--br);margin:16px 0}
.srow{display:flex;gap:8px}
.sold-banner{background:var(--soldbg);border:1.5px solid var(--sold);border-radius:10px;padding:10px 14px;margin-bottom:12px;font-size:13px;color:var(--sold);font-weight:600}
.bnav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--br);display:flex;padding:8px 0 20px;z-index:100}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;color:var(--gray);cursor:pointer;padding:4px}
.ni.on{color:var(--b)}.nico{font-size:22px}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--n);color:#fff;padding:10px 22px;border-radius:24px;font-size:14px;font-weight:600;z-index:999;opacity:0;transition:opacity .25s,transform .25s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div id="fleetView">
<div class="hdr">
<div class="htop"><h1>FCR <span>Fleet</span></h1><button class="addbtn" onclick="openForm()">+</button></div>
<div class="stabs">
<div class="stab aa" id="st-all" onclick="sf('all')"><div class="sn" id="c-all">0</div><div class="sl2">All</div></div>
<div class="stab" id="st-available" onclick="sf('available')"><div class="sn g" id="c-av">0</div><div class="sl2">Available</div></div>
<div class="stab" id="st-down" onclick="sf('down')"><div class="sn r" id="c-dn">0</div><div class="sl2">Down</div></div>
<div class="stab" id="st-sold" onclick="sf('sold')"><div class="sn p" id="c-sl">0</div><div class="sl2">Sold</div></div>
</div></div>
<div class="sw"><input id="srch" placeholder="Search name, ID, notes..." oninput="render()" autocomplete="off"></div>
<div class="ctabs" id="ctabs"></div>
<div class="lst" id="lst"></div>
<div class="bnav">
<div class="ni on" id="bn-all" onclick="sf('all')"><span class="nico">&#128676;</span><span>All</span></div>
<div class="ni" id="bn-available" onclick="sf('available')"><span class="nico">&#9989;</span><span>Available</span></div>
<div class="ni" id="bn-down" onclick="sf('down')"><span class="nico">&#128308;</span><span>Down</span></div>
<div class="ni" id="bn-sold" onclick="sf('sold')"><span class="nico">&#128176;</span><span>Sold</span></div>
<div class="ni" onclick="openForm()"><span class="nico">&#10133;</span><span>Add</span></div>
</div>
</div>

<div id="histView" style="display:none">
<div class="hback">
<button onclick="showFleet()">&#8592;</button>
<div style="flex:1"><div class="htitle" id="hTitle"></div><div class="hsub" id="hSub"></div></div>
<button class="hedit" onclick="editFromHist()">&#9998; Edit</button>
</div>
<div class="hpage">
<div id="soldBanner"></div>
<div class="tog" id="histTog"></div>
<div id="histNoteBox"></div>
<div class="divider"></div>
<div style="font-size:16px;font-weight:700;margin-bottom:12px">Service &amp; History</div>
<button class="addsvc" id="addSvcBtn" onclick="toggleSvc()">+ Add Service / Repair / Note</button>
<div id="svcForm" style="display:none" class="svcbox">
<div class="svctypes">
<div class="sbt on" id="sbt-s" onclick="setST('s')">&#128295; Service</div>
<div class="sbt" id="sbt-r" onclick="setST('r')">&#128296; Repair</div>
<div class="sbt" id="sbt-n" onclick="setST('n')">&#128221; Note</div>
</div>
<div class="fg"><label>Date</label><input id="svcDate"></div>
<div class="fg"><label>Details</label><textarea id="svcNote" placeholder="Describe the work, parts replaced, cost..."></textarea></div>
<div class="srow">
<button class="fb fsv" style="flex:1;padding:11px" onclick="saveSvc()">Save Entry</button>
<button class="fb fcn" style="flex:1;padding:11px" onclick="toggleSvc()">Cancel</button>
</div>
</div>
<div id="histList"></div>
</div>
</div>

<!-- ADD/EDIT FORM -->
<div class="ov" id="formOv">
<div class="sh">
<div class="hdl"></div>
<div class="shdr"><div class="sttl" id="formTitle">Add Machine</div><button class="xcl" onclick="closeForm()">&#x2715;</button></div>
<div class="frm">
<input type="hidden" id="fid">
<div class="fg"><label>Machine Name *</label>
<select id="fnamesel" onchange="onNameSel()" style="width:100%;padding:12px 14px;border:1.5px solid var(--br);border-radius:10px;font-size:15px;color:var(--n);background:#fff;outline:none;font-family:inherit;-webkit-appearance:none">
<option value="">-- Select machine --</option>
<option value="Sea-Doo GTI 130">Sea-Doo GTI 130</option>
<option value="Sea-Doo Spark Trixx 3UP">Sea-Doo Spark Trixx 3UP</option>
<option value="Sea-Doo Spark Trixx 2UP">Sea-Doo Spark Trixx 2UP</option>
<option value="MB B52 23ft Surf Boat">MB B52 23ft Surf Boat</option>
<option value="other">Other (custom)</option>
</select>
<input id="fname" placeholder="Enter machine name" autocomplete="off" style="display:none;margin-top:8px;width:100%;padding:12px 14px;border:1.5px solid var(--br);border-radius:10px;font-size:15px;color:var(--n);background:#fff;outline:none;font-family:inherit"></div>
<div class="two">
<div class="fg"><label>Purchase Price *</label><input id="fprice" placeholder="$12,000" autocomplete="off" oninput="fmtPrice(this)" inputmode="numeric"></div>
<div class="fg"><label>Date Acquired</label><input id="facq" autocomplete="off"></div>
</div>
<div class="two">
<div class="fg"><label>Machine ID</label><input id="fmid" placeholder="14, A, 46" autocomplete="off"></div>
<div class="fg"><label>Year</label><input id="fyr" placeholder="2023" autocomplete="off" type="number"></div>
</div>
<div class="fg"><label>Category</label><select id="fcat">
<option value="gti">Sea-Doo GTI 130</option>
<option value="t3">Sea-Doo Spark Trixx 3UP</option>
<option value="t2">Sea-Doo Spark Trixx 2UP</option>
<option value="boat">Boat</option>
</select></div>
<div class="fg"><label>Notes</label><textarea id="fnotes" placeholder="Current issues, damage, notes..."></textarea></div>
</div>
<div class="fbtns">
<button class="fb fsv" onclick="saveForm()">Save Machine</button>
<button class="fb fcn" onclick="closeForm()">Cancel</button>
<button class="fb fsl" id="fsellBtn" onclick="openSell()">&#128176; Sell Machine</button>
<button class="fb fdl" id="fdelBtn" onclick="delMachine()">&#128465; Remove Machine</button>
</div>
</div></div>

<!-- DOWN FORM -->
<div class="ov" id="downOv">
<div class="sh down-sheet">
<div class="hdl"></div>
<div class="shdr"><div class="sttl">&#128308; Mark as Down</div><button class="xcl" onclick="closeDown()">&#x2715;</button></div>
<div class="frm">
<div class="fg"><label>Machine</label><div id="downName" style="font-size:16px;font-weight:700;color:var(--n);padding:6px 0"></div></div>
<div class="fg"><label>Reason</label>
<div class="rgrid">
<div class="rbtn" onclick="pickR(this)">&#128295; Maintenance</div>
<div class="rbtn" onclick="pickR(this)">&#128296; Repair</div>
<div class="rbtn" onclick="pickR(this)">&#128165; Damage</div>
<div class="rbtn" onclick="pickR(this)">&#9874; Impeller</div>
<div class="rbtn" onclick="pickR(this)">&#128268; Engine</div>
<div class="rbtn" onclick="pickR(this)">&#128736; Hull</div>
<div class="rbtn" onclick="pickR(this)">&#9203; Waiting on Parts</div>
<div class="rbtn" onclick="pickR(this)">&#128221; Other</div>
</div></div>
<div class="fg"><label>Details (optional)</label><textarea id="downNote" placeholder="Any additional details..."></textarea></div>
<div class="fg"><label>Date</label><input id="downDate"></div>
</div>
<div class="fbtns">
<button class="fb" style="background:var(--rt);color:#fff" onclick="confirmDown()">&#128308; Confirm Down</button>
<button class="fb fcn" onclick="closeDown()">Cancel</button>
</div>
</div></div>

<!-- SELL FORM -->
<div class="ov" id="sellOv">
<div class="sh sell-sheet">
<div class="hdl"></div>
<div class="shdr"><div class="sttl">&#128176; Sell Machine</div><button class="xcl" onclick="closeSell()">&#x2715;</button></div>
<div class="frm">
<div class="fg"><label>Machine</label><div id="sellName" style="font-size:16px;font-weight:700;color:var(--n);padding:6px 0"></div></div>
<div class="fg"><label>Sale Price</label><input id="sellPrice" placeholder="$15,000" autocomplete="off"></div>
<div class="fg"><label>Buyer (optional)</label><input id="sellBuyer" placeholder="Name or company" autocomplete="off"></div>
<div class="fg"><label>Date Sold</label><input id="sellDate"></div>
<div class="fg"><label>Notes (optional)</label><textarea id="sellNote" placeholder="Any notes about the sale..."></textarea></div>
</div>
<div class="fbtns">
<button class="fb" style="background:var(--sold);color:#fff" onclick="confirmSell()">&#128176; Confirm Sale</button>
<button class="fb fcn" onclick="closeSell()">Cancel</button>
</div>
</div></div>

<div class="toast" id="toast"></div>

function load(){try{var s=JSON.parse(localStorage.getItem(KEY));return(s&&s.length)?s:JSON.parse(JSON.stringify(SEED));}catch(e){return JSON.parse(JSON.stringify(SEED));}}
function store(d){localStorage.setItem(KEY,JSON.stringify(d));}
function today(){return new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});}

var M=load(),fst="all",fcat="all",curId=null,svcT="s",downId=null,pickedR=null,sellId=null;

function sf(s){
  fst=s;
  ["all","available","down","sold"].forEach(function(x){
    var e=document.getElementById("st-"+x);
    if(e)e.className="stab"+(s===x?" "+(x==="all"?"aa":x==="available"?"av":x==="down"?"dn":"sl"):"");
    var b=document.getElementById("bn-"+x);
    if(b)b.className="ni"+(s===x?" on":"");
  });
  render();
}

function sc(c){fcat=c;renderCatTabs();render();}

function renderCatTabs(){
  var el=document.getElementById("ctabs");
  var tabs=[{k:"all",lbl:"All"}].concat(Object.keys(CATS).map(function(k){return{k:k,lbl:CATS[k]};}));
  var active=M.filter(function(m){return m.status!=="sold";});
  el.innerHTML=tabs.map(function(t){
    var av=t.k==="all"?active.filter(function(m){return m.status==="available";}).length:active.filter(function(m){return m.cat===t.k&&m.status==="available";}).length;
    var dn=t.k==="all"?active.filter(function(m){return m.status==="down";}).length:active.filter(function(m){return m.cat===t.k&&m.status==="down";}).length;
    return "<div class='ct"+(fcat===t.k?" on":"")+"' onclick='sc(\""+t.k+"\")'>"
      +"<span>"+t.lbl+"</span>"
      +"<span class='ct-counts'><span class='ct-av'>"+av+"&#9989;</span><span class='ct-dn'>"+dn+"&#128308;</span></span>"
      +"</div>";
  }).join("");
}

function tapAv(id){
  var m=M.find(function(x){return x.id===id;});
  if(!m||m.status==="available"||m.status==="sold")return;
  m.history=m.history||[];
  m.history.unshift({date:today(),type:"st",note:"Marked available"});
  m.status="available";
  store(M);render();
  if(document.getElementById("histView").style.display!=="none")refreshHist();
  toast("Available: #"+m.mid);
}

function tapDn(id){
  var m=M.find(function(x){return x.id===id;});
  if(!m||m.status==="down"||m.status==="sold")return;
  downId=id;pickedR=null;
  document.getElementById("downName").textContent=m.name+" \u2014 #"+m.mid;
  document.getElementById("downNote").value="";
  document.getElementById("downDate").value=today();
  document.querySelectorAll(".rbtn").forEach(function(e){e.classList.remove("on");});
  document.getElementById("downOv").classList.add("open");
}
function pickR(el){
  document.querySelectorAll(".rbtn").forEach(function(e){e.classList.remove("on");});
  el.classList.add("on");pickedR=el.textContent.trim();
}
function closeDown(){document.getElementById("downOv").classList.remove("open");downId=null;}
function confirmDown(){
  var m=M.find(function(x){return x.id===downId;});if(!m)return;
  var reason=pickedR||"Down";
  var details=document.getElementById("downNote").value.trim();
  var note=reason+(details?" \u2014 "+details:"");
  m.history=m.history||[];
  m.history.unshift({date:document.getElementById("downDate").value||today(),type:"d",note:note});
  m.status="down";
  store(M);closeDown();render();
  if(document.getElementById("histView").style.display!=="none")refreshHist();
  toast("Down: #"+m.mid+" \u2014 "+reason);
}

function openSell(){
  var eid=document.getElementById("fid").value;
  if(!eid)return;
  sellId=parseInt(eid);
  var m=M.find(function(x){return x.id===sellId;});
  if(!m)return;
  closeForm();
  document.getElementById("sellName").textContent=m.name+" \u2014 #"+m.mid;
  document.getElementById("sellPrice").value="";
  document.getElementById("sellBuyer").value="";
  document.getElementById("sellDate").value=today();
  document.getElementById("sellNote").value="";
  document.getElementById("sellOv").classList.add("open");
}
function closeSell(){document.getElementById("sellOv").classList.remove("open");sellId=null;}
function confirmSell(){
  var m=M.find(function(x){return x.id===sellId;});if(!m)return;
  var price=document.getElementById("sellPrice").value.trim();
  var buyer=document.getElementById("sellBuyer").value.trim();
  var date=document.getElementById("sellDate").value||today();
  var note2=document.getElementById("sellNote").value.trim();
  var note="Sold"+(price?" for "+price:"")+(buyer?" to "+buyer:"")+(note2?" \u2014 "+note2:"");
  m.history=m.history||[];
  m.history.unshift({date:date,type:"sl",note:note});
  m.status="sold";
  m.soldDate=date;m.soldPrice=price;m.soldBuyer=buyer;
  store(M);closeSell();render();
  if(document.getElementById("histView").style.display!=="none")refreshHist();
  toast("Sold: #"+m.mid);
}

function render(){
  var q=document.getElementById("srch").value.toLowerCase();
  var el=document.getElementById("lst");
  var f=M.filter(function(m){
    return(fst==="all"?m.status!=="sold":m.status===fst)&&(fcat==="all"||m.cat===fcat)&&(!q||m.name.toLowerCase().indexOf(q)>=0||m.mid.toLowerCase().indexOf(q)>=0||(m.notes||"").toLowerCase().indexOf(q)>=0);
  });
  var active=M.filter(function(m){return m.status!=="sold";});
  document.getElementById("c-all").textContent=active.length;
  document.getElementById("c-av").textContent=M.filter(function(m){return m.status==="available";}).length;
  document.getElementById("c-dn").textContent=M.filter(function(m){return m.status==="down";}).length;
  document.getElementById("c-sl").textContent=M.filter(function(m){return m.status==="sold";}).length;
  renderCatTabs();
  if(!f.length){el.innerHTML="<div class='empty'><div style='font-size:48px;margin-bottom:12px'>&#128269;</div><p>No machines found</p></div>";return;}
  el.innerHTML=f.map(function(m){
    var ia=m.status==="available",isSold=m.status==="sold";
    var hc=(m.history&&m.history.length)?" \u00b7 "+m.history.length+" record"+(m.history.length>1?"s":""):"";
    var nt=m.notes?"<div class='nt'>&#128221; "+m.notes+"</div>":"";
    var statusBadge=ia?"&#9989; Available":isSold?"&#128176; Sold":"&#128308; Down";
    var badgeBg=ia?"var(--gbg)":isSold?"var(--soldbg)":"var(--rbg)";
    var badgeColor=ia?"var(--gt)":isSold?"var(--sold)":"var(--rt)";
    var soldInfo=isSold&&m.soldDate?"<div class='nt' style='background:var(--soldbg);color:var(--sold)'>&#128176; Sold "+(m.soldDate||"")+(m.soldPrice?" \u00b7 "+m.soldPrice:"")+(m.soldBuyer?" \u00b7 "+m.soldBuyer:"")+"</div>":"";
    var btns=isSold
      ?"<div class='tog'><div class='tb' onclick='reactivate("+m.id+")' style='grid-column:1/-1'>&#9989; Reactivate</div></div>"
      :"<div class='tog'><div class='tb"+(ia?" oa":"")+"' onclick='tapAv("+m.id+")'>&#9989; Available</div><div class='tb"+(!ia?" od":"")+"' onclick='tapDn("+m.id+")'>&#128308; Down</div></div>";
    return "<div class='card "+m.status+"'>"
      +"<div style='display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px'>"
      +"<div style='cursor:pointer' onclick='openHist("+m.id+")'>"
      +"<div class='mn'>"+m.name+" \u2014 #"+m.mid+"</div>"
      +"<div class='ms'>"+(m.yr?m.yr+" \u00b7 ":"")+CATS[m.cat]+hc+"</div>"
      +"</div>"
      +"<div style='font-size:11px;font-weight:600;padding:3px 10px;border-radius:12px;background:"+badgeBg+";color:"+badgeColor+";flex-shrink:0;margin-left:8px'>"+statusBadge+"</div>"
      +"</div>"+nt+soldInfo+btns
      +"<div class='cbtns'><button class='cb' onclick='openHist("+m.id+")'>&#128203; History</button><button class='cb' onclick='openForm("+m.id+")'>&#9998; Edit</button></div>"
      +"</div>";
  }).join("");
}

function reactivate(id){
  var m=M.find(function(x){return x.id===id;});if(!m)return;
  m.history=m.history||[];
  m.history.unshift({date:today(),type:"st",note:"Reactivated to fleet"});
  m.status="available";delete m.soldDate;delete m.soldPrice;delete m.soldBuyer;
  store(M);render();toast("Reactivated: #"+m.mid);
}

function openForm(id){
  var m=id?M.find(function(x){return x.id===id;}):null;
  curId=id||null;
  document.getElementById("formTitle").textContent=m?"Edit Machine":"Add Machine";
  document.getElementById("fid").value=m?m.id:"";
  var knownNames=["Sea-Doo GTI 130","Sea-Doo Spark Trixx 3UP","Sea-Doo Spark Trixx 2UP","MB B52 23ft Surf Boat"];
  var sel=document.getElementById("fnamesel");
  var inp=document.getElementById("fname");
  if(m){
    if(knownNames.indexOf(m.name)>=0){sel.value=m.name;inp.style.display="none";inp.value=m.name;}
    else{sel.value="other";inp.style.display="block";inp.value=m.name;}
  } else {
    sel.value="";inp.style.display="none";inp.value="";
  }
  document.getElementById("fmid").value=m?m.mid:"";
  document.getElementById("fyr").value=m?m.yr:"";
  document.getElementById("fcat").value=m?m.cat:"gti";
  document.getElementById("fnotes").value=m?m.notes:"";
  document.getElementById("fprice").value=m?m.price||"":"";
  document.getElementById("facq").value=m?m.acq||"":today();
  document.getElementById("fdelBtn").style.display=m?"block":"none";
  document.getElementById("fsellBtn").style.display=(m&&m.status!=="sold")?"block":"none";
  document.getElementById("formOv").classList.add("open");
}
function closeForm(){document.getElementById("formOv").classList.remove("open");}
function saveForm(){
  var _sel=document.getElementById("fnamesel");
  var n=_sel.value==="other"||_sel.value===""?document.getElementById("fname").value.trim():_sel.value;
  if(!n){alert("Enter machine name");return;}
  var eid2=document.getElementById("fid").value;
  var pr=document.getElementById("fprice").value.trim();
  if(!eid2&&!pr){alert("Enter purchase price");return;}
  var eid=document.getElementById("fid").value;
  var isNew=!eid;
  var acq=document.getElementById("facq").value||today();
  var obj={
    id:eid?parseInt(eid):Date.now(),
    name:n,
    mid:document.getElementById("fmid").value.trim()||"-",
    yr:document.getElementById("fyr").value.trim(),
    cat:document.getElementById("fcat").value,
    status:"available",
    notes:document.getElementById("fnotes").value.trim(),
    price:document.getElementById("fprice").value.trim(),
    acq:acq
  };
  if(eid){
    var i=M.findIndex(function(x){return x.id===parseInt(eid);});
    if(i!==-1){obj.history=M[i].history||[];obj.status=M[i].status;obj.soldDate=M[i].soldDate;obj.soldPrice=M[i].soldPrice;obj.soldBuyer=M[i].soldBuyer;M[i]=obj;}
  } else {
    obj.history=[{date:acq,type:"ac",note:"Acquired"+(obj.price?" for "+obj.price:"")}];
    M.push(obj);
  }
  store(M);closeForm();render();toast(eid?"Updated":"Added");
}
function delMachine(){
  if(!confirm("Remove this machine?"))return;
  var eid=parseInt(document.getElementById("fid").value);
  M=M.filter(function(x){return x.id!==eid;});
  store(M);closeForm();render();
  if(document.getElementById("histView").style.display!=="none")showFleet();
  toast("Removed");
}

function openHist(id){
  var m=M.find(function(x){return x.id===id;});if(!m)return;
  curId=id;
  document.getElementById("hTitle").textContent=m.name+" \u2014 #"+m.mid;
  document.getElementById("hSub").textContent=(m.yr?m.yr+" \u00b7 ":"")+CATS[m.cat];
  document.getElementById("svcDate").value=today();
  document.getElementById("svcNote").value="";
  document.getElementById("svcForm").style.display="none";
  document.getElementById("addSvcBtn").style.display=m.status==="sold"?"none":"block";
  refreshHist();
  document.getElementById("fleetView").style.display="none";
  document.getElementById("histView").style.display="block";
  window.scrollTo(0,0);
}
function refreshHist(){
  var m=M.find(function(x){return x.id===curId;});if(!m)return;
  var ia=m.status==="available",isSold=m.status==="sold";
  var sb=document.getElementById("soldBanner");
  sb.innerHTML=isSold?"<div class='sold-banner'>&#128176; Sold "+(m.soldDate||"")+(m.soldPrice?" \u00b7 "+m.soldPrice:"")+(m.soldBuyer?" \u00b7 "+m.soldBuyer:"")+"</div>":"";
  if(!isSold){
    document.getElementById("histTog").innerHTML=
      "<div class='tb"+(ia?" oa":"")+"' onclick='tapAv("+m.id+")'>&#9989; Available</div>"
      +"<div class='tb"+(!ia?" od":"")+"' onclick='tapDn("+m.id+")'>&#128308; Down</div>";
  } else {
    document.getElementById("histTog").innerHTML=
      "<div class='tb' onclick='reactivate("+m.id+")' style='grid-column:1/-1'>&#9989; Reactivate</div>";
  }
  document.getElementById("histNoteBox").innerHTML=m.notes?"<div class='nt' style='margin-bottom:8px'>&#128221; "+m.notes+"</div>":"";
  renderHist(m);
}
function renderHist(m){
  var h=m.history||[];
  var map={s:"ht-s",r:"ht-r",n:"ht-n",st:"ht-st",d:"ht-d",ac:"ht-ac",sl:"ht-sl"};
  var lbl={s:"&#128295; Service",r:"&#128296; Repair",n:"&#128221; Note",st:"&#128260; Status",d:"&#128308; Down",ac:"&#9989; Acquired",sl:"&#128176; Sold"};
  if(!h.length){document.getElementById("histList").innerHTML="<div style='text-align:center;padding:30px 0;color:var(--gray);font-size:14px'>No history yet</div>";return;}
  document.getElementById("histList").innerHTML=h.map(function(e){
    return "<div class='hentry'><div class='hdate'>&#128197; "+e.date+"</div><span class='htype "+(map[e.type]||"ht-n")+"'>"+(lbl[e.type]||"Note")+"</span><div class='hnote'>"+e.note+"</div></div>";
  }).join("");
}
function showFleet(){document.getElementById("histView").style.display="none";document.getElementById("fleetView").style.display="block";window.scrollTo(0,0);}
function editFromHist(){openForm(curId);}
function toggleSvc(){
  var f=document.getElementById("svcForm"),b=document.getElementById("addSvcBtn");
  if(f.style.display==="none"){f.style.display="block";b.style.display="none";document.getElementById("svcDate").value=today();document.getElementById("svcNote").value="";}
  else{f.style.display="none";b.style.display="block";}
}
function setST(t){svcT=t;["s","r","n"].forEach(function(x){document.getElementById("sbt-"+x).className="sbt"+(t===x?" on":"");});}
function saveSvc(){
  var note=document.getElementById("svcNote").value.trim();
  if(!note){alert("Enter a note");return;}
  var m=M.find(function(x){return x.id===curId;});if(!m)return;
  m.history=m.history||[];
  m.history.unshift({date:document.getElementById("svcDate").value||today(),type:svcT,note:note});
  store(M);toggleSvc();renderHist(m);toast("Entry saved");
}
function onNameSel(){
  var sel=document.getElementById("fnamesel");
  var inp=document.getElementById("fname");
  var cat=document.getElementById("fcat");
  if(sel.value==="other"){
    inp.style.display="block";inp.value="";inp.focus();
  } else {
    inp.style.display="none";inp.value=sel.value;
    var map={"Sea-Doo GTI 130":"gti","Sea-Doo Spark Trixx 3UP":"t3","Sea-Doo Spark Trixx 2UP":"t2","MB B52 23ft Surf Boat":"boat"};
    if(map[sel.value]) cat.value=map[sel.value];
  }
}
function fmtPrice(el){
  var raw=el.value.replace(/[^0-9]/g,"");
  if(raw===""){el.value="";return;}
  el.value="$"+parseInt(raw,10).toLocaleString("en-US");
}
function toast(msg){var t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(function(){t.classList.remove("show");},2500);}

document.getElementById("formOv").addEventListener("click",function(e){if(e.target===document.getElementById("formOv"))closeForm();});
document.getElementById("downOv").addEventListener("click",function(e){if(e.target===document.getElementById("downOv"))closeDown();});
document.getElementById("sellOv").addEventListener("click",function(e){if(e.target===document.getElementById("sellOv"))closeSell();});
render();
</script>
